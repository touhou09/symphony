services:
  orchestrator:
    restart: unless-stopped
    build:
      context: .
      dockerfile: elixir/deploy/orchestrator.Dockerfile
    env_file:
      - path: ${SYMPHONY_ENV_FILE:-.env}
        required: false
    environment:
      HOME: /root
      SYMPHONY_WORKSPACE_ROOT: /var/lib/symphony/workspaces
      SYMPHONY_SOURCE_REPO: ${SYMPHONY_SOURCE_REPO:-https://github.com/touhou09/symphony}
      SYMPHONY_SOURCE_BRANCH: ${SYMPHONY_SOURCE_BRANCH:-dev}
      SYMPHONY_PR_REPO: ${SYMPHONY_PR_REPO:-touhou09/symphony}
      SYMPHONY_PR_BASE: ${SYMPHONY_PR_BASE:-dev}
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./elixir/WORKFLOW.md:/app/elixir/WORKFLOW.md:ro
      - ${HOME}/.codex/auth.json:/run/symphony/codex-host/auth.json:ro
      - ${HOME}/.codex/config.toml:/run/symphony/codex-host/config.toml:ro
      - ${SYMPHONY_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - symphony-codex-home:/root/.codex
      - symphony-workspaces:/var/lib/symphony/workspaces
      - symphony-logs:/var/log/symphony
    ports:
      - "127.0.0.1:${SYMPHONY_OBSERVABILITY_PORT:-4000}:4000"
    command:
      - ./bin/symphony
      - --i-understand-that-this-will-be-running-without-the-usual-guardrails
      - --logs-root
      - /var/log/symphony
      - --host
      - 0.0.0.0
      - --port
      - "4000"
      - /app/elixir/WORKFLOW.md

volumes:
  symphony-codex-home:
  symphony-workspaces:
  symphony-logs:
